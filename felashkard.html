<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فلش کارت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }
        .header span {
            color: #999;
            font-size: 14px;
        }
        .card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 25px;
            padding: 60px 30px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .card:hover {
            transform: scale(1.02);
        }
        .word {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .meaning {
            font-size: 20px;
            opacity: 0.9;
        }
        .hint {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-top: 15px;
        }
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn-action {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-forgot {
            background: #ff6b6b;
            color: white;
        }
        .btn-forgot:hover {
            background: #ee5a5a;
        }
        .btn-learned {
            background: #51cf66;
            color: white;
        }
        .btn-learned:hover {
            background: #40c057;
        }
        .btn-flip {
            background: #f8f9fa;
            color: #555;
            border: 2px solid #eee;
        }
        .counter {
            color: #999;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span>📚 مرور واژگان</span>
            <span>۳ / ۱۵</span>
        </div>

        <div class="card" onclick="this.classList.toggle('flipped'); flipCard()">
            <div class="word">Book</div>
            <div class="meaning" style="display:none;" id="meaning">کتاب</div>
            <div class="hint" id="hint">👆 برای دیدن معنی کلیک کنید</div>
        </div>

        <div class="actions">
            <button class="btn-action btn-forgot">❌</button>
            <button class="btn-action btn-flip">🔄</button>
            <button class="btn-action btn-learned">✅</button>
        </div>

        <div class="counter">❌ فراموش کردم &nbsp;&nbsp;&nbsp; ✅ یاد گرفتم</div>
    </div>

    <script>
        function flipCard() {
            const meaning = document.getElementById('meaning');
            const hint = document.getElementById('hint');
            if (meaning.style.display === 'none') {
                meaning.style.display = 'block';
                hint.textContent = '👆 برای برگشتن کلیک کنید';
            } else {
                meaning.style.display = 'none';
                hint.textContent = '👆 برای دیدن معنی کلیک کنید';
            }
        }
    </script>
</body>
</html>
